name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rl_transportes_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres" --health-interval=5s --health-timeout=5s --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: apps/backend
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rl_transportes_ci
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci_jwt_secret_replace_in_real_deploy_minimum_32_chars
      JWT_REFRESH_SECRET: ci_jwt_refresh_secret_replace_minimum_32_chars
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json
      - run: npm ci
      - run: npx prisma validate
      - run: npx prisma migrate deploy
      - run: npm run build
      - run: npm test
      - run: npm run test:e2e
      - run: npm audit --production

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  code-export:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Gerar PROJETO-CODIGO-COMPLETO.txt
        run: node scripts/dump-sources.mjs > PROJETO-CODIGO-COMPLETO-ci.txt
      - uses: actions/upload-artifact@v4
        with:
          name: projeto-codigo-completo
          path: PROJETO-CODIGO-COMPLETO-ci.txt
          retention-days: 14
